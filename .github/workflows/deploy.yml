name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and generate static HTML
        run: |
          rm -rf dist .output
          bun run build
          bun scripts/prerender.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add custom domain
        run: printf 'gmtl.ink\n' > ./dist/client/CNAME

      - name: Ensure .nojekyll and copy PWA artifacts into upload dir
        run: |
          UPLOAD_PATH=./dist/client
          touch "$UPLOAD_PATH/.nojekyll"
          # Copy sw.js / workbox-*.js from wherever vite-plugin-pwa emitted them.
          for src in ./dist ./.output/public ./.output; do
            [ -d "$src" ] || continue
            [ -f "$src/sw.js" ] && cp -f "$src/sw.js" "$UPLOAD_PATH/sw.js" || true
            for wb in "$src"/workbox-*.js "$src"/workbox-*.js.map; do
              [ -f "$wb" ] && cp -f "$wb" "$UPLOAD_PATH/" || true
            done
          done

      - name: Verify upload artifacts (exact upload directory)
        run: |
          UPLOAD_PATH=./dist/client
          echo "Listing $UPLOAD_PATH:"
          ls -la "$UPLOAD_PATH"
          test -f "$UPLOAD_PATH/index.html"
          test -f "$UPLOAD_PATH/sw.js"
          test -f "$UPLOAD_PATH/.nojekyll"
          find "$UPLOAD_PATH" -maxdepth 1 -name 'workbox-*.js' | grep -q .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
