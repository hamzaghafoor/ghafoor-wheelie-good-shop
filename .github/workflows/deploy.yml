name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and generate static HTML
        run: |
          bun run build
          bun scripts/prerender.mjs

      - name: Copy PWA service worker into published folder
        run: |
          cp dist/sw.js dist/client/sw.js
          cp dist/workbox-*.js dist/client/ 2>/dev/null || true
          ls -la dist/client/sw.js dist/client/workbox-*.js

      - name: Verify static site output
        run: test -f ./dist/client/index.html && test -f ./dist/client/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add custom domain
        run: printf 'gmtl.ink\n' > ./dist/client/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
